<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Execution Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main:        #1a1a1c;
    --bg-panel:       #232328;
    --text-primary:   #e0e0e4;
    --text-secondary: #8b8b93;
    --border-color:   #383841;
    --task-idle:      #303036;
    --task-active:    #f1c40f;
    --task-done:      #00e676;
    --btn-blue:       #3498db;
    --btn-blue-h:     #2980b9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    padding: 20px 28px;
    gap: 20px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
  h1 span { color: #3498db; }
  .readouts { display: flex; gap: 28px; }
  .readout-col { display: flex; flex-direction: column; align-items: flex-end; }
  .readout-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-secondary); margin-bottom: 2px; font-weight: 600;
  }
  .readout-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 700; color: var(--text-primary);
    min-width: 60px; text-align: right; transition: color 0.2s;
  }
  #disp-time { color: #00f2fe; }

  /* ── Grid ───────────────────────────────────────────────── */
  .grid-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    flex-shrink: 0;
  }
  #task-grid {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 8px;
  }
  .task {
    height: 44px;
    border-radius: 6px;
    background: var(--task-idle);
    transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
  }
  .task.active {
    background: var(--task-active);
    box-shadow: 0 0 14px rgba(241,196,15,0.55);
    transform: scale(1.06);
    z-index: 1;
  }
  .task.done {
    background: var(--task-done);
    box-shadow: 0 0 8px rgba(0,230,118,0.3);
    transform: scale(1);
  }

  /* ── Progress ───────────────────────────────────────────── */
  .progress-row {
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .progress-bar-wrap {
    flex: 1; height: 6px; background: var(--border-color);
    border-radius: 3px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #3498db, #00e676);
    border-radius: 3px; transition: width 0.1s linear;
  }
  #progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-secondary);
    min-width: 64px; text-align: right;
  }

  /* ── Controls ───────────────────────────────────────────── */
  .control-panel {
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    gap: 48px;
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 300px;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .slider-label span {
    color: var(--text-primary);
  }

  /* Custom Slider Range */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    background: transparent;
  }
  input[type=range]:focus {
    outline: none;
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    cursor: pointer;
    background: var(--border-color);
    border-radius: 3px;
  }
  input[type=range]::-webkit-slider-thumb {
    height: 20px;
    width: 20px;
    border-radius: 50%;
    background: var(--text-primary);
    cursor: pointer;
    -webkit-appearance: none;
    margin-top: -7px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    transition: transform 0.1s;
  }
  input[type=range]:active::-webkit-slider-thumb {
    transform: scale(1.2);
  }

  .slider-marks {
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
  }
  .slider-marks span {
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-group { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 14px 28px; border-radius: 8px; border: none;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px; cursor: pointer;
    transition: all .18s; white-space: nowrap;
  }
  #btn-start {
    background: var(--btn-blue); color: #fff;
    box-shadow: 0 4px 14px rgba(52,152,219,.35);
  }
  #btn-start:hover:not(:disabled) {
    background: var(--btn-blue-h); transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(52,152,219,.45);
  }
  #btn-start:disabled { background: #2a2a31; color: #4a4a56; cursor: not-allowed; box-shadow: none; }
  #btn-reset { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
  #btn-reset:hover:not(:disabled) { color: var(--text-primary); border-color: var(--text-secondary); transform: translateY(-1px); }
  #btn-reset:disabled { opacity: .4; cursor: not-allowed; }
  #status-bar {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary); letter-spacing: .5px;
    height: 16px; transition: color .3s; flex-shrink: 0; text-align: center;
  }
  #status-bar.done { color: #00e676; }
  #status-bar.run  { color: #f1c40f; }
  .progress-row { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
  #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3498db, #00e676); border-radius: 3px; transition: width 0.1s linear; }
  #progress-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); min-width: 64px; text-align: right; }

</style>
</head>
<body>

<header>
  <h1>Parallel <span>Execution</span> Simulator</h1>
  <div class="readouts">
    <div class="readout-col">
      <div class="readout-label">Active Cores</div>
      <div class="readout-value" id="disp-cores">4</div>
    </div>
    <div class="readout-col">
      <div class="readout-label">Tasks / Core</div>
      <div class="readout-value" id="disp-tpc">32</div>
    </div>
    <div class="readout-col">
      <div class="readout-label">Time (s)</div>
      <div class="readout-value" id="disp-time">0.00</div>
    </div>
  </div>
</header>

<div class="grid-panel">
  <div id="task-grid"></div>
</div>

<div class="progress-row">
  <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-label">0 / 128</div>
</div>

<div class="control-panel">
  <div class="slider-group">
    <div class="slider-top">
      <span class="slider-top-label">Hardware Pool</span>
      <span id="pool-val">4 CORES</span>
    </div>
    <input type="range" id="core-slider" min="0" max="5" value="2" step="1">
    <div class="slider-marks">
      <span>1</span><span>2</span><span>4</span><span>8</span><span>16</span><span>32</span>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn" id="btn-start">▶ Start</button>
    <button class="btn" id="btn-reset">↺ Reset</button>
  </div>
</div>

<div id="status-bar">SELECT CORES AND PRESS START</div>

  <script>

(() => {
  "use strict";

  const TOTAL        = 128;
  const CORE_OPTS    = [1, 2, 4, 8, 16, 32];
  // Time (ms) for 1 core to process 1 task — drives the speed difference
  const TASK_SLOT_MS = 60;
  // Minimum yellow hold so even 32-core bursts are visible
  const MIN_HOLD_MS  = 90;

  const gridEl      = document.getElementById('task-grid');
  const dispCores   = document.getElementById('disp-cores');
  const dispTpc     = document.getElementById('disp-tpc');
  const dispTime    = document.getElementById('disp-time');
  const sliderEl    = document.getElementById('core-slider');
  const poolValEl   = document.getElementById('pool-val');
  const btnStart    = document.getElementById('btn-start');
  const btnReset    = document.getElementById('btn-reset');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const statusBar   = document.getElementById('status-bar');

  let tasks       = [];
  let isRunning   = false;
  let rafId       = null;
  let startTs     = 0;
  let batchIndex  = 0;
  let batchCount  = 0;
  let batchDelay  = 0;
  let nextAt      = 0;
  let activeCells = [];
  let committed   = 0;   // tasks committed as done

  /* ── Grid ─────────────────────────────────────────────── */
  function buildGrid() {
    gridEl.innerHTML = '';
    tasks = [];
    for (let i = 0; i < TOTAL; i++) {
      const el = document.createElement('div');
      el.className = 'task';
      gridEl.appendChild(el);
      tasks.push(el);
    }
  }

  /* ── Readouts ─────────────────────────────────────────── */
  function getCores() { return CORE_OPTS[+sliderEl.value]; }

  function updateReadouts() {
    const c = getCores();
    dispCores.textContent = c;
    dispTpc.textContent   = Math.ceil(TOTAL / c);
    poolValEl.textContent = `${c} CORE${c > 1 ? 'S' : ''}`;
  }

  sliderEl.addEventListener('input', () => { if (!isRunning) updateReadouts(); });

  /* ── Helpers ──────────────────────────────────────────── */
  function setProgress(n) {
    progressBar.style.width = (n / TOTAL * 100) + '%';
    progressLbl.textContent = `${n} / ${TOTAL}`;
  }

  function setStatus(msg, cls) {
    statusBar.className    = cls || '';
    statusBar.textContent  = msg;
  }

  /* ── Reset ────────────────────────────────────────────── */
  function resetSim() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    isRunning   = false;
    batchIndex  = 0;
    committed   = 0;
    activeCells = [];
    tasks.forEach(t => { t.className = 'task'; });
    dispTime.textContent  = '0.00';
    btnStart.textContent  = '▶ Start';
    btnStart.disabled     = false;
    btnReset.disabled     = false;
    setProgress(0);
    setStatus('SELECT CORES AND PRESS START');
    updateReadouts();
  }

  /* ── Animation loop (rAF state machine) ──────────────── */
  // Each tick: if time >= nextAt → commit previous yellow → fire next batch yellow
  // After all batches fired, wait for last commit then finish.
  function tick(now) {
    if (!isRunning) return;

    dispTime.textContent = ((now - startTs) / 1000).toFixed(2);

    if (now < nextAt) {
      rafId = requestAnimationFrame(tick);
      return;
    }

    // Commit previous active cells → done
    activeCells.forEach(el => { el.classList.remove('active'); el.classList.add('done'); });
    activeCells = [];

    // All batches sent and committed?
    if (batchIndex >= batchCount) {
      const cores = getCores();
      dispTime.textContent = ((now - startTs) / 1000).toFixed(2);
      isRunning = false;
      setStatus(
        `✓ COMPLETE  —  ${cores} core${cores > 1 ? 's' : ''}  ·  ${TOTAL} tasks  ·  ${((now - startTs) / 1000).toFixed(2)}s`,
        'done'
      );
      btnStart.textContent = '▶ Run Again';
      btnStart.disabled    = false;
      btnReset.disabled    = false;
      return;
    }

    // Fire next batch (yellow)
    const cores = getCores();
    const from  = batchIndex * cores;
    const to    = Math.min(from + cores, TOTAL);
    for (let i = from; i < to; i++) {
      tasks[i].classList.add('active');
      activeCells.push(tasks[i]);
    }
    committed  = to;
    setProgress(to);
    setStatus(`⟳  Batch ${batchIndex + 1} / ${batchCount}  —  tasks ${from + 1}–${to}`, 'run');

    batchIndex++;
    nextAt = now + batchDelay;

    rafId = requestAnimationFrame(tick);
  }

  /* ── Start ────────────────────────────────────────────── */
  function startSim() {
    if (isRunning) return;

    // Visual reset (no full DOM rebuild — just clear classes)
    tasks.forEach(t => { t.className = 'task'; });
    activeCells = [];
    committed   = 0;
    batchIndex  = 0;
    setProgress(0);

    const cores = getCores();
    batchCount  = Math.ceil(TOTAL / cores);

    // Time per batch = TASK_SLOT_MS per task * 1 slot with N parallel tasks
    // = TASK_SLOT_MS   (N cores finish N tasks in the same time 1 core finishes 1)
    // Total time = batchCount * TASK_SLOT_MS = (128/cores) * 60ms
    // → 1 core:  128 batches × 60ms = 7.68s
    // → 4 cores:  32 batches × 60ms = 1.92s
    // → 32 cores:  4 batches × 60ms = 0.24s
    batchDelay = Math.max(TASK_SLOT_MS, MIN_HOLD_MS);

    isRunning         = true;
    btnStart.disabled = true;
    btnReset.disabled = true;

    startTs = performance.now();
    nextAt  = startTs;   // fire first batch immediately

    setStatus(`⟳  Running ${cores} core${cores > 1 ? 's' : ''}…`, 'run');
    dispTime.textContent = '0.00';
    updateReadouts();

    rafId = requestAnimationFrame(tick);
  }

  btnStart.addEventListener('click', startSim);
  btnReset.addEventListener('click', resetSim);

  buildGrid();
  updateReadouts();
})();
</script>
</body>
</html>
